 <!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Imperium StoryForge</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>

        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap');
        .isf-root { font-family: 'Inter', sans-serif; background: radial-gradient(ellipse at top, #14110a 0%, #0a0908 55%, #050505 100%); color: #ece6d8; }
        .isf-display { font-family: 'Cinzel', serif; }
        .isf-serif { font-family: 'Cormorant Garamond', serif; }
        .isf-glass { background: linear-gradient(135deg, rgba(255,255,255,0.045), rgba(255,255,255,0.012)); border: 1px solid rgba(212,175,55,0.15); backdrop-filter: blur(16px); }
        .isf-glow { box-shadow: 0 0 28px rgba(212,175,55,0.08), inset 0 1px 0 rgba(255,255,255,0.04); }
        .isf-input { width: 100%; background: rgba(255,255,255,0.02); border: 1px solid rgba(212,175,55,0.18); border-radius: 0.5rem; padding: 0.6rem 0.75rem; font-size: 0.875rem; color: #ece6d8; outline: none; }
        .isf-input:focus { border-color: rgba(212,175,55,0.5); }
        .isf-input::placeholder { color: #6b6760; }
        @keyframes isf-pulse { 0%,100% { opacity: .55; } 50% { opacity: 1; } }
        .isf-seal { animation: isf-pulse 3s ease-in-out infinite; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(212,175,55,0.25); border-radius: 3px; }
        select.isf-input option { background: #0e0c08; color: #ece6d8; }
      
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:#050505;color:#ece6d8}
#root{display:flex;min-height:100vh}
#_isf_load{position:fixed;inset:0;background:radial-gradient(ellipse at top,#14110a 0%,#0a0908 55%,#050505 100%);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;z-index:9999}
._isf_ring{width:72px;height:72px;border-radius:50%;border:1.5px solid rgba(212,175,55,0.5);display:flex;align-items:center;justify-content:center;animation:_isfp 2.5s ease-in-out infinite}
._isf_t1{font-family:"Cinzel",serif;font-size:12px;letter-spacing:.35em;color:#d4af37;text-transform:uppercase}
._isf_t2{font-size:10px;letter-spacing:.2em;color:#6b6760;font-family:sans-serif}
@keyframes _isfp{0%,100%{opacity:.25;transform:scale(.96)}50%{opacity:1;transform:scale(1)}}
.animate-spin{animation:_spin 1s linear infinite}
@keyframes _spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.line-clamp-3{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.line-clamp-4{display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
</style>
</head>
<body>

<div id="_isf_load">
  <div class="_isf_ring">
    <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#d4af37" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 20h20M5 20V10l7-7 7 7v10"/><path d="M9 20v-5h6v5"/>
    </svg>
  </div>
  <div class="_isf_t1">Imperium StoryForge</div>
  <div class="_isf_t2">Iniciando plataforma...</div>
</div>

<div id="root"></div>
